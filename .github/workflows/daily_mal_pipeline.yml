name: Daily MAL Data Pipeline

on:
  schedule:
    # Runs daily at 00:00 UTC
    - cron: '0 0 * * *'
  # Allows manual execution directly from the GitHub UI for testing
  workflow_dispatch:

permissions:
  contents: write  # Grants GitHub Actions permission to commit files

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Extraction & Rotation Script
        run: python mal_pipeline.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/
          
          # Only commit if changes exist
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated data refresh: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" && git push)

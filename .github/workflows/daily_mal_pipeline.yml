name: Daily MAL Data Pipeline

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Extraction & Rotation Script
        run: python extract_jinkan_api_github.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/
          
          # Check for changes, commit, rebase remote updates, then push safely
          git diff --quiet && git diff --staged --quiet || ( \
            git commit -m "Automated data refresh: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" && \
            git pull --rebase origin main && \
            git push origin main \
          )
